name: vikas

services:

  # ── PostgreSQL 16 + pgvector ────────────────────────────────────────────────
  # db:
  #   image: pgvector/pgvector:pg16
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: vikas
  #     POSTGRES_PASSWORD: vikas_dev
  #     POSTGRES_DB: vikas
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U vikas -d vikas"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 10s


  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

    # REMOVE THIS IN PRODUCTION
    # ports:
    #   - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── FastAPI API ───────────────────────────────────────
  api:
    image: ${DOCKER_IMAGE_PREFIX}/vikas-api:latest
    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      ENV: production
      LOG_LEVEL: INFO

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery Worker ─────────────────────────────────────
  worker:
    image: ${DOCKER_IMAGE_PREFIX}/vikas-api:latest
    restart: unless-stopped

    command: celery -A workers.celery_app worker --loglevel=info

    env_file:
      - .env

    environment:
      ENV: production
      LOG_LEVEL: INFO

    extra_hosts:
      - "host.docker.internal:host-gateway"

    depends_on:
      redis:
        condition: service_healthy

  # ── Next.js Frontend ──────────────────────────────────
  web:
    image: ${DOCKER_IMAGE_PREFIX}/vikas-web:latest
    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      NODE_ENV: production

    depends_on:
      api:
        condition: service_healthy

  # ── pgAdmin ───────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped

    ports:
      - "5050:80"

    env_file:
      - .env

volumes:
  postgres_data: