agent_name: preference_learner
tier: fast
uses_llm: false
output_table: preference_summaries
has_rls: true
external_dependency: none
skip_concurrent: false

happy_path_params: {}  # reads content_feedback from DB, no params

row_count_sql: "SELECT COUNT(*) FROM preference_summaries WHERE org_id = '{org_id}'"
expected_min_rows: 0
idempotent: true  # aggregation is idempotent

api_read_endpoint: ~
api_write_endpoint: ~
api_agent_trigger: "POST /api/v1/agents/preference_learner/run"
api_invalid_body: ~
api_invalid_expected_status: ~

expected_list_fields: []
expected_nullable_fields: []

ui_page: /settings
ui_component: "Preference learning status"
ui_checklist:
  - "Settings page shows learned preference count"
  - "Preferences show content_type and summary values"
  - "After approving/rejecting content — preferences update on next run"
