agent_name: auto_mode_engine
tier: fast
uses_llm: false
output_table: ~  # orchestrator — dispatches pipelines, no direct DB write
has_rls: false
external_dependency: none
skip_concurrent: true

happy_path_params:
  max_pipelines: 1
  dry_run: true  # dry_run=true prevents actual pipeline dispatch

row_count_sql: ~
expected_min_rows: 0
idempotent: true

api_read_endpoint: "GET /api/v1/settings/auto-mode"
api_write_endpoint: "PUT /api/v1/settings/auto-mode"
api_agent_trigger: "POST /api/v1/agents/auto_mode_engine/run"
api_write_body:
  enabled: false
  max_daily_pipelines: 3
api_invalid_body: '{"enabled": "not-a-boolean"}'
api_invalid_expected_status: 422

expected_list_fields: ["seed_keywords"]
expected_nullable_fields: []

ui_page: /auto-mode
ui_component: "Auto mode toggle + schedule settings"
ui_checklist:
  - "Auto mode page shows enabled toggle (on/off)"
  - "Schedule time (02:00 UTC default) is editable"
  - "max_daily_pipelines shows numeric input"
  - "Seed keywords list editable as comma-separated input"
  - "Toggling auto mode on/off persists after page refresh"
