agent_name: strategy_synthesizer
tier: advanced
uses_llm: true
output_table: strategy_reports
has_rls: true
external_dependency: none
skip_concurrent: true  # advanced-tier LLM is expensive

happy_path_params:
  limit: 3

row_count_sql: "SELECT COUNT(*) FROM strategy_reports WHERE org_id = '{org_id}'"
expected_min_rows: 0
idempotent: false

api_read_endpoint: "GET /api/v1/strategy-reports"
api_write_endpoint: ~
api_agent_trigger: "POST /api/v1/agents/strategy_synthesizer/run"
api_invalid_body: ~
api_invalid_expected_status: ~

expected_list_fields: []
expected_nullable_fields: []

ui_page: /strategy
ui_component: "Strategy reports list + run button"
ui_checklist:
  - "Strategy page shows reports ordered by created_at DESC"
  - "Each report shows opportunities_analyzed count"
  - "recommendations renders as a readable list (not raw JSONB)"
  - "summary field shows executive summary text"
  - "Run new strategy button triggers and shows loading state"
