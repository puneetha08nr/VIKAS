agent_name: pipeline_orchestrator
tier: standard
uses_llm: false
output_table: pipeline_runs
has_rls: true
external_dependency: none
skip_concurrent: true  # dispatches multiple agents

happy_path_params:
  opportunity_id: ~
  auto_publish: false

row_count_sql: "SELECT COUNT(*) FROM pipeline_runs WHERE org_id = '{org_id}'"
expected_min_rows: 0
idempotent: false

api_read_endpoint: ~
api_write_endpoint: ~
api_agent_trigger: "POST /api/v1/agents/pipeline_orchestrator/run"
api_invalid_body: ~
api_invalid_expected_status: ~

expected_list_fields: []
expected_nullable_fields: []

ui_page: /dashboard
ui_component: "Pipeline runs log"
ui_checklist:
  - "Dashboard shows recent pipeline runs with status"
  - "Pipeline run links to the opportunity it processed"
  - "Sub-agent statuses visible within pipeline detail view"
