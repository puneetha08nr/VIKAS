agent_name: content_director
tier: standard
uses_llm: false
output_table: ~  # orchestrator — dispatches sub-agents, no direct DB write
has_rls: false
external_dependency: none
skip_concurrent: true  # dispatches multiple sub-agents

happy_path_params:
  opportunity_id: ~  # null ok — director handles gracefully

row_count_sql: ~
expected_min_rows: 0
idempotent: true

api_read_endpoint: ~
api_write_endpoint: ~
api_agent_trigger: "POST /api/v1/agents/content_director/run"
api_invalid_body: ~
api_invalid_expected_status: ~

expected_list_fields: []
expected_nullable_fields: []

ui_page: /opportunities
ui_component: "Run content pipeline button on opportunity"
ui_checklist:
  - "Clicking 'Create Content' on an opportunity triggers content_director"
  - "After run — article, LinkedIn post, and tweet thread appear in /content"
  - "Pipeline run ID shown in agent runs log"
