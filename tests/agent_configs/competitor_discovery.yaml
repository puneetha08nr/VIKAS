agent_name: competitor_discovery
tier: fast
uses_llm: true
output_table: competitors
has_rls: true
external_dependency: none
skip_concurrent: true  # LLM cost

happy_path_params:
  keyword: "ai marketing automation"

row_count_sql: "SELECT COUNT(*) FROM competitors WHERE org_id = '{org_id}'"
expected_min_rows: 0
idempotent: true

api_read_endpoint: "GET /api/v1/competitors"
api_write_endpoint: ~
api_agent_trigger: "POST /api/v1/agents/competitor_discovery/run"
api_invalid_body: ~
api_invalid_expected_status: ~

expected_list_fields: []
expected_nullable_fields: []

ui_page: /competitors
ui_component: "Auto-discovered competitors list"
ui_checklist:
  - "Discovered competitors appear with domain names"
  - "No duplicate domains in the list"
