agent_name: keyword_validator
tier: fast
uses_llm: true
output_table: keywords
has_rls: true
external_dependency: dataforseo_optional
skip_concurrent: true  # LLM cost

happy_path_params:
  keyword_ids: []  # empty list — agent fetches raw keywords from DB itself

row_count_sql: "SELECT COUNT(*) FROM keywords WHERE org_id = '{org_id}' AND status = 'validated'"
expected_min_rows: 0  # passes even if no raw keywords to validate
idempotent: true

api_read_endpoint: "GET /api/v1/keywords"
api_write_endpoint: "POST /api/v1/keywords/validate-all"
api_agent_trigger: "POST /api/v1/agents/keyword_validator/run"
api_write_body: {}
api_invalid_body: '{"keyword_ids": "not-a-list"}'
api_invalid_expected_status: 422

expected_list_fields: []
expected_nullable_fields: []

ui_page: /keywords
ui_component: "Validate All Keywords button + status badges"
ui_checklist:
  - "Page /keywords shows 'Validate All' button"
  - "Validated keywords show green badge, archived show grey"
  - "Running validate-all updates keyword statuses without page refresh"
  - "Filtering by status=validated shows only validated rows"
