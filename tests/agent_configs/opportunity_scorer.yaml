agent_name: opportunity_scorer
tier: fast
uses_llm: false
output_table: opportunities
has_rls: true
external_dependency: none
skip_concurrent: false

happy_path_params:
  keyword_ids: []  # fetches validated keywords from DB

row_count_sql: "SELECT COUNT(*) FROM opportunities WHERE org_id = '{org_id}'"
expected_min_rows: 0  # passes if no validated keywords exist yet
idempotent: true  # UPSERT by keyword_id

api_read_endpoint: "GET /api/v1/opportunities"
api_write_endpoint: ~
api_agent_trigger: "POST /api/v1/agents/opportunity_scorer/run"
api_invalid_body: ~
api_invalid_expected_status: ~

expected_list_fields: []
expected_nullable_fields: []

ui_page: /opportunities
ui_component: "Opportunities table with composite scores"
ui_checklist:
  - "Page /opportunities loads with opportunities table"
  - "Rows show keyword, source, and composite score"
  - "Sort by composite_score_desc puts highest scores first"
  - "Status filter works (new/selected/rejected)"
  - "Click opportunity → opens content director trigger"
