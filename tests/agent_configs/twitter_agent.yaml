agent_name: twitter_agent
tier: standard
uses_llm: true
output_table: twitter_threads
has_rls: true
external_dependency: none
skip_concurrent: true

happy_path_params:
  article_id: ~
  keyword: "ai marketing automation"

row_count_sql: "SELECT COUNT(*) FROM twitter_threads WHERE org_id = '{org_id}'"
expected_min_rows: 0
idempotent: false

