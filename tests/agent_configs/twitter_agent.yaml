api_invalid_expected_status: ~

expected_list_fields: []
expected_nullable_fields: []

ui_page: /content
ui_component: "Twitter/X threads tab"
ui_checklist:
  - "Twitter threads appear with individual tweet preview"
  - "tweets JSONB rendered as numbered tweet list (not raw JSON)"
  - "Thread length shown (tweet count)"
  - "Status badge visible (draft/approved)"
