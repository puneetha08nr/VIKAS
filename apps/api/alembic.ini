[alembic]
script_location = db/migrations
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is overridden in env.py from the ADMIN_DATABASE_URL env var
# (admin user with DDL privileges — distinct from DATABASE_URL / vikas_app)
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check REVISION_SCRIPT_FILENAME --fix

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
