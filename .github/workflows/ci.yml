name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Linting ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint apps/api
        run: ruff check apps/api

  # ── Job 2: Type checking ────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies + pyright
        run: |
          pip install -e apps/api
          pip install pyright
      - name: Run pyright
        run: pyright apps/api

  # ── Job 3: Unit tests ───────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e apps/api pytest pytest-asyncio pytest-cov respx
      - name: Run unit tests
        run: pytest tests/unit/ --ignore=tests/integration/ -m "not integration" --cov=apps/api --cov-report=term-missing
