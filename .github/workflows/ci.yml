name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, main]

jobs:

  # ── Job 1: Lint (ruff) ───────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync

      - name: Lint
        working-directory: apps/api
        run: uv run ruff check .

  # ── Job 2: Type check (pyright) ─────────────────────────────────────────────
  typecheck:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync

      - name: Run pyright
        working-directory: apps/api
        run: uv run pyright .

  # ── Job 3: Unit tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync

      - name: Run unit tests
        working-directory: apps/api
        run: uv run pytest ../../tests/unit/ -q --tb=short
        env:
          PYTHONPATH: .
