name: Deploy to Linux Server

on:
  push:
    branches:
      - master

env:
  DOCKER_IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------------
      # Checkout Repository
      # ---------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------------
      # Generate .env file
      # ---------------------------------
      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > .env

          echo "" >> .env
          echo "DOCKER_IMAGE_PREFIX=${{ secrets.DOCKER_USERNAME }}" >> .env

      # ---------------------------------
      # Setup Docker Buildx
      # ---------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------------------------
      # DockerHub Login
      # ---------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------------
      # Build API Image
      # ---------------------------------
      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vikas-api:latest
            ${{ secrets.DOCKER_USERNAME }}/vikas-api:${{ github.sha }}

      # ---------------------------------
      # Build WEB Image
      # ---------------------------------
      - name: Build and Push WEB Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vikas-web:latest
            ${{ secrets.DOCKER_USERNAME }}/vikas-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=https://vikasai.elyts.tech

      # ---------------------------------
      # Create Deploy Directory
      # ---------------------------------
      - name: Create Remote Deploy Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            mkdir -p ${{ secrets.DEPLOY_DIR }}

      # Prepare compose file
      - name: Prepare deployment files
        run: |
          cp infra/docker/docker-compose.yml docker-compose.yml

      
      # ---------------------------------
      # Copy docker-compose.yml
      # ---------------------------------
      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml"
          target: ${{ secrets.DEPLOY_DIR }}

      # ---------------------------------
      # Copy .env
      # ---------------------------------
      - name: Copy .env file
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: ".env"
          target: ${{ secrets.DEPLOY_DIR }}

      # ---------------------------------
      # Deploy Containers
      # ---------------------------------
      - name: Deploy Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |

            cd ${{ secrets.DEPLOY_DIR }}

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKER_USERNAME }}" \
              --password-stdin

            docker compose pull

            docker compose up -d --remove-orphans

            docker image prune -af
