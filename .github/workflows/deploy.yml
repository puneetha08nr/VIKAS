name: Deploy to Linux Server

on:
  push:
    branches:
      - master

env:
  DOCKER_IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------------
      # Checkout Repository
      # ---------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------------
      # Generate .env file
      # ---------------------------------
      - name: Create .env file
        run: |
          printf '%s\n' \
            "DATABASE_URL=${{ secrets.ADMIN_DATABASE_URL }}" \
            "ADMIN_DATABASE_URL=${{ secrets.ADMIN_DATABASE_URL }}" \
            "REDIS_URL=redis://redis:6379/0" \
            "CELERY_BROKER_URL=redis://redis:6379/0" \
            "CELERY_RESULT_BACKEND=redis://redis:6379/0" \
            "ENV=production" \
            "LOG_LEVEL=INFO" \
            "DEV_AUTH_BYPASS=true" \
            "MOCK_LLM=false" \
            "DAILY_COST_LIMIT_USD=50.0" \
            "CORS_ORIGINS=[\"https://vikasai.elyts.tech\"]" \
            "BASE_URL=https://vikasai.elyts.tech" \
            "LLM_PROVIDER=anthropic" \
            "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
            "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
            "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            "SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}" \
            "SETTINGS_ENCRYPTION_KEY=${{ secrets.SETTINGS_ENCRYPTION_KEY }}" \
            "S3_BUCKET=vikas-media" \
            "AWS_REGION=us-east-1" \
            "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            "SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}" \
            "SLACK_ALERT_CHANNEL=#vikas-alerts" \
            "SMTP_HOST=${{ secrets.SMTP_HOST }}" \
            "SMTP_PORT=587" \
            "SMTP_USER=${{ secrets.SMTP_USER }}" \
            "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" \
            "VIDEO_TEAM_EMAIL=${{ secrets.VIDEO_TEAM_EMAIL }}" \
            "GOOGLE_SEARCH_API_KEY=${{ secrets.GOOGLE_SEARCH_API_KEY }}" \
            "GOOGLE_SEARCH_CX=${{ secrets.GOOGLE_SEARCH_CX }}" \
            "NEWSAPI_KEY=${{ secrets.NEWSAPI_KEY }}" \
            "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" \
            "GSC_SERVICE_ACCOUNT_JSON=${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}" \
            "GSC_SITE_URL=${{ secrets.GSC_SITE_URL }}" \
            "GSC_CLIENT_ID=${{ secrets.GSC_CLIENT_ID }}" \
            "GSC_CLIENT_SECRET=${{ secrets.GSC_CLIENT_SECRET }}" \
            "GSC_REFRESH_TOKEN=${{ secrets.GSC_REFRESH_TOKEN }}" \
            "GA4_PROPERTY_ID=${{ secrets.GA4_PROPERTY_ID }}" \
            "GA4_SERVICE_ACCOUNT_JSON=${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}" \
            "WORDPRESS_URL=${{ secrets.WORDPRESS_URL }}" \
            "WORDPRESS_APP_PASSWORD=${{ secrets.WORDPRESS_APP_PASSWORD }}" \
            "AHREFS_API_KEY=${{ secrets.AHREFS_API_KEY }}" \
            "DATAFORSEO_LOGIN=${{ secrets.DATAFORSEO_LOGIN }}" \
            "DATAFORSEO_PASSWORD=${{ secrets.DATAFORSEO_PASSWORD }}" \
            "DOCKER_IMAGE_PREFIX=${{ secrets.DOCKER_USERNAME }}" \
            > .env

      # ---------------------------------
      # Setup Docker Buildx
      # ---------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------------------------
      # DockerHub Login
      # ---------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------------
      # Build API Image
      # ---------------------------------
      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            elytsllc/vikas-api:latest
            elytsllc/vikas-api:${{ github.sha }}

      # ---------------------------------
      # Build WEB Image
      # ---------------------------------
      - name: Build and Push WEB Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: |
            elytsllc/vikas-web:latest
            elytsllc/vikas-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=https://vikasai.elyts.tech

      # ---------------------------------
      # Create Deploy Directory
      # ---------------------------------
      - name: Create Remote Deploy Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            mkdir -p ${{ secrets.DEPLOY_DIR }}

      # Prepare compose file
      - name: Prepare deployment files
        run: |
          cp infra/docker/docker-compose.yml docker-compose.yml

      
      # ---------------------------------
      # Copy docker-compose.yml
      # ---------------------------------
      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.yml"
          target: ${{ secrets.DEPLOY_DIR }}

      # ---------------------------------
      # Copy .env
      # ---------------------------------
      - name: Copy .env file
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: ".env"
          target: ${{ secrets.DEPLOY_DIR }}

      # ---------------------------------
      # Deploy Containers
      # ---------------------------------
      - name: Deploy Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |

            cd ${{ secrets.DEPLOY_DIR }}

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKER_USERNAME }}" \
              --password-stdin

            docker compose pull

            docker compose up -d --remove-orphans

            docker image prune -af

      # ---------------------------------
      # Run Database Migrations
      # ---------------------------------
      - name: Run Database Migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            docker compose exec -T \
              -e ADMIN_DATABASE_URL="${{ secrets.ADMIN_DATABASE_URL }}" \
              api uv run alembic upgrade head
